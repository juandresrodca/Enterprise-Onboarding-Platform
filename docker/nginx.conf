# Frontend vhost: static Astro output + /api reverse proxy to the backend.
# TLS terminates in front of this (ingress / load balancer / IIS ARR); see
# docs/DEPLOYMENT.md. HSTS is emitted by the backend when EIO_COOKIE_SECURE=true.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers for the static tier.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy same-origin always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Server-Sent Events (job progress) need buffering off.
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/index.html /index.html;
    }
}
